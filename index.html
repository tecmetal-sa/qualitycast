<!DOCTYPE html>
<html lang="es" data-tema="dark" data-acento="cyan">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QualityCast · Control de Inyectoras</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QualityCast">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg: #0b0f14; --surface: #121821; --surface-2: #18202c; --surface-3: #1f2937;
  --border: #243243; --border-strong: #2f4257; --text: #e5eaf0; --text-dim: #98a4b3;
  --text-muted: #5b6a7c; --accent: #22d3ee; --accent-soft: rgba(34,211,238,0.12);
  --accent-border: rgba(34,211,238,0.35); --ok: #34d399; --ok-soft: rgba(52,211,153,0.14);
  --nok: #f87171; --nok-soft: rgba(248,113,113,0.14); --warn: #fbbf24;
  --radius-sm: 6px; --radius: 10px; --radius-lg: 14px;
  --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  --sans: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif;
  --pad: 24px; --gap: 14px; --inp-h: 52px;
}
html[data-tema="light"] {
  --bg:#f4f6f8;--surface:#ffffff;--surface-2:#f8fafc;--surface-3:#eef2f6;
  --border:#e2e8f0;--border-strong:#cbd5e1;--text:#1e293b;--text-dim:#475569;
  --text-muted:#94a3b8;--accent:#0891b2;--accent-soft:rgba(8,145,178,.08);--accent-border:rgba(8,145,178,.30);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.4;-webkit-font-smoothing:antialiased;}
#root{min-height:100vh;}
.app{display:flex;flex-direction:column;min-height:100vh;}
.main{flex:1;padding:var(--pad);max-width:1100px;margin:0 auto;width:100%;}

/* ── Offline banner ── */
.offline-banner{position:sticky;top:60px;z-index:19;background:rgba(234,179,8,.15);
border-bottom:1px solid rgba(234,179,8,.3);color:#fbbf24;font-size:12px;
font-family:var(--mono);padding:7px var(--pad);display:flex;align-items:center;gap:10px;}
.offline-banner .dot{width:6px;height:6px;border-radius:50%;background:#fbbf24;}

/* ── Pending badge ── */
.pending-badge{background:rgba(234,179,8,.15);border:1px solid rgba(234,179,8,.3);
color:#fbbf24;font-size:11px;font-family:var(--mono);padding:3px 8px;
border-radius:999px;cursor:pointer;}
.pending-badge:hover{background:rgba(234,179,8,.25);}

/* ── Top bar ── */
.topbar{display:flex;align-items:center;gap:20px;padding:0 var(--pad);
height:60px;background:var(--surface);border-bottom:1px solid var(--border);
position:sticky;top:0;z-index:20;}
.brand{display:flex;align-items:center;gap:10px;font-weight:600;}
.brand-mark{width:28px;height:28px;border-radius:7px;background:var(--accent);
color:var(--bg);display:grid;place-items:center;font-family:var(--mono);font-size:14px;font-weight:700;}
.brand-title{font-size:14px;}
.tb-spacer{flex:1;}
.tb-pill{display:inline-flex;align-items:center;gap:8px;padding:5px 10px;
background:var(--surface-2);border:1px solid var(--border);border-radius:999px;
font-size:11px;color:var(--text-dim);font-family:var(--mono);}
.tb-pill .dot{width:6px;height:6px;border-radius:50%;background:var(--ok);}
.tb-user{display:flex;align-items:center;gap:10px;padding:4px 4px 4px 12px;
background:var(--surface-2);border:1px solid var(--border);border-radius:999px;}
.tb-user-name{font-size:13px;font-weight:500;}
.tb-user-turno{font-size:11px;color:var(--text-muted);font-family:var(--mono);}
.tb-user-avatar{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;
background:var(--accent-soft);color:var(--accent);font-weight:600;font-size:12px;
border:1px solid var(--accent-border);}
.tb-logout{background:transparent;border:1px solid var(--border);color:var(--text-dim);
font-size:12px;padding:7px 12px;border-radius:8px;cursor:pointer;font-family:var(--mono);}
.tb-logout:hover{color:var(--text);border-color:var(--border-strong);}
.stepper-nav{display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:8px;padding:6px 12px 6px 8px;
border-radius:999px;border:1px solid var(--border);background:var(--surface-2);
color:var(--text-muted);font-size:12px;}
.step[data-state="current"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.step[data-state="done"]{color:var(--ok);border-color:rgba(52,211,153,.3);background:var(--ok-soft);}
.step-num{width:20px;height:20px;border-radius:50%;display:grid;place-items:center;
font-family:var(--mono);font-size:11px;font-weight:600;background:var(--surface-3);color:var(--text-dim);}
.step[data-state="current"] .step-num{background:var(--accent);color:var(--bg);}
.step[data-state="done"] .step-num{background:var(--ok);color:#0a1f15;}
.step-lbl{font-weight:500;font-family:var(--mono);letter-spacing:0.01em;}

/* ── Login ── */
.login{min-height:calc(100vh - 60px);display:grid;place-items:center;padding:40px 20px;}
.login-card{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);
border-radius:var(--radius-lg);padding:32px;box-shadow:0 10px 40px rgba(0,0,0,0.25);}
.login-title{font-size:22px;font-weight:600;margin:0 0 6px;}
.login-sub{color:var(--text-dim);font-size:14px;margin:0 0 28px;}
.pin-dots{display:flex;gap:14px;justify-content:center;margin:10px 0 28px;}
.pin-dot{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border-strong);background:transparent;transition:all 0.12s;}
.pin-dot[data-filled="1"]{background:var(--accent);border-color:var(--accent);}
.pin-dot[data-error="1"]{background:var(--nok);border-color:var(--nok);animation:shake 0.4s;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.keypad button{height:64px;border-radius:var(--radius);background:var(--surface-2);
border:1px solid var(--border);color:var(--text);font-size:20px;font-weight:500;
cursor:pointer;font-family:var(--mono);transition:all 0.08s;}
.keypad button:hover{background:var(--surface-3);}
.keypad button:active:not(:disabled){transform:scale(0.96);}
.keypad button.ghost{background:transparent;border-color:transparent;color:var(--text-muted);}
.offline-login-info{background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);
border-radius:var(--radius);padding:14px 16px;margin-bottom:20px;font-size:13px;color:#fbbf24;}

/* ── Slide ── */
.slide{animation:fade-in 0.24s ease;}
.slide-hd{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.slide-title{font-size:24px;font-weight:600;margin:0;letter-spacing:-0.01em;}
.slide-sub{color:var(--text-dim);font-size:14px;margin:2px 0 0;}
.back-btn{background:var(--surface-2);border:1px solid var(--border);color:var(--text);
width:40px;height:40px;border-radius:var(--radius);cursor:pointer;font-size:16px;flex-shrink:0;}
.back-btn:hover{background:var(--surface-3);}
.slide-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:28px;}
.slide-actions{display:flex;gap:10px;align-items:center;margin-top:20px;flex-wrap:wrap;}
.slide-hint{font-size:12px;color:var(--warn);font-family:var(--mono);}

/* ── Section label ── */
.sec-lbl{font-size:30px;color:var(--text);text-transform:uppercase;
letter-spacing:0.04em;font-family:var(--mono);font-weight:600;margin-bottom:12px;margin-top:24px;}
.sec-lbl:first-child{margin-top:0;}

/* ── Fields ── */
.field-row{display:grid;gap:14px;}
.field-row.c2{grid-template-columns:1fr 1fr;}
.field-row.c3{grid-template-columns:1fr 1fr 1fr;}
@media(max-width:640px){.field-row.c2,.field-row.c3{grid-template-columns:1fr;}}
.field{display:flex;flex-direction:column;gap:8px;}
.field-lbl{font-size:30px;color:var(--text);text-transform:uppercase;
letter-spacing:0.04em;font-family:var(--mono);font-weight:600;}
.inp{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
padding:0 14px;height:var(--inp-h);color:var(--text);font:inherit;font-size:16px;width:100%;
outline:none;font-family:var(--mono);}
.inp:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);}
.inp::placeholder{color:var(--text-muted);}
.inp.big{height:58px;font-size:22px;font-weight:500;}

/* ── Botones ── */
.btn{background:var(--accent);color:#06111a;border:0;border-radius:var(--radius);
padding:0 24px;height:var(--inp-h);font:inherit;font-weight:600;font-size:14px;
cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:filter 0.1s;}
.btn:hover:not(:disabled){filter:brightness(1.08);}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
.btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border);}
.btn.secondary:hover:not(:disabled){background:var(--surface-3);}
.btn.big{height:58px;font-size:15px;padding:0 28px;}

/* ── Inyectoras ── */
.iny-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
@media(max-width:640px){.iny-grid{grid-template-columns:repeat(2,1fr);}}
.iny-btn{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-lg);
padding:36px 20px;text-align:center;cursor:pointer;color:var(--text);transition:all 0.1s;
min-height:120px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.iny-btn:hover{border-color:var(--border-strong);transform:translateY(-2px);}
.iny-btn[data-on="1"]{border-color:var(--accent);background:var(--accent-soft);
box-shadow:0 0 0 1px var(--accent-border) inset,0 8px 24px -8px var(--accent-soft);}
.iny-id{font-family:var(--mono);font-size:26px;font-weight:600;letter-spacing:0.02em;}

/* ── Tipo protector ── */
.tipo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
@media(max-width:640px){.tipo-grid{grid-template-columns:1fr;}}
.tipo-btn{background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius-lg);
padding:28px 16px;text-align:center;cursor:pointer;color:var(--text);transition:all 0.1s;
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.tipo-btn:hover{border-color:var(--border-strong);transform:translateY(-2px);}
.tipo-btn[data-on="1"]{border-color:var(--accent);background:var(--accent-soft);
box-shadow:0 0 0 1px var(--accent-border) inset;}
.tipo-nombre{font-family:var(--mono);font-size:22px;font-weight:700;letter-spacing:0.04em;color:var(--text);}
.tipo-desc{font-size:12px;color:var(--text-muted);font-family:var(--mono);}

/* ── Bocas selector ── */
.bocas-wrap{display:flex;align-items:center;gap:16px;margin-top:8px;}
.bocas-btn{width:52px;height:52px;border-radius:var(--radius);background:var(--surface-2);
border:1px solid var(--border);color:var(--text);font-size:22px;font-weight:600;
cursor:pointer;display:grid;place-items:center;font-family:var(--mono);transition:all 0.08s;}
.bocas-btn:hover:not(:disabled){background:var(--surface-3);}
.bocas-btn:disabled{opacity:0.3;cursor:not-allowed;}
.bocas-val{font-family:var(--mono);font-size:42px;font-weight:700;color:var(--accent);
min-width:60px;text-align:center;line-height:1;}
.bocas-lbl{font-size:13px;color:var(--text-dim);font-family:var(--mono);}

/* ── OK/NOK ── */
.oknok{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.oknok-lbl{font-size:30px;font-weight:600;color:var(--text);margin-bottom:12px;}
.oknok-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.oknok-btn{height:52px;border-radius:var(--radius);border:1.5px solid var(--border);
background:transparent;color:var(--text-dim);font:inherit;font-weight:600;font-size:14px;
cursor:pointer;font-family:var(--mono);letter-spacing:0.05em;transition:all 0.1s;}
.oknok-btn.ok:hover{border-color:var(--ok);color:var(--ok);}
.oknok-btn.nok:hover{border-color:var(--nok);color:var(--nok);}
.oknok-btn.ok[data-on="1"]{border-color:var(--ok);background:var(--ok-soft);color:var(--ok);}
.oknok-btn.nok[data-on="1"]{border-color:var(--nok);background:var(--nok-soft);color:var(--nok);}

/* ── OkNok grid general ── */
.oknok-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:640px){.oknok-grid{grid-template-columns:1fr;}}
.oknok-grid.c2{grid-template-columns:repeat(2,1fr);}
.oknok-grid.c1{grid-template-columns:1fr;}

/* ── Grilla de bocas (wrap) ── */
/* Cada grupo: etiqueta de control + cards de bocas en fila que wrappea */
.bocas-grupo{margin-bottom:20px;}
.bocas-grupo-lbl{font-size:30px;color:var(--text);font-family:var(--mono);font-weight:600;
text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
.bocas-cards{display:flex;flex-wrap:wrap;gap:12px;}
.boca-card{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);
padding:14px;display:flex;flex-direction:column;gap:10px;min-width:160px;flex:1;max-width:220px;}
.boca-card-hd{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--accent);
border-bottom:1px solid var(--border);padding-bottom:8px;}
.boca-card-lbl{font-size:11px;color:var(--text-dim);text-transform:uppercase;
letter-spacing:0.08em;font-family:var(--mono);font-weight:500;margin-bottom:4px;}
/* Peso input en card */
.peso-inp{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);
padding:0 10px;height:48px;color:var(--text);font:inherit;font-size:20px;font-weight:600;
width:100%;outline:none;font-family:var(--mono);text-align:center;
-moz-appearance:textfield;}
.peso-inp::-webkit-outer-spin-button,.peso-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.peso-inp:focus{border-color:var(--accent);background:var(--surface);box-shadow:0 0 0 3px var(--accent-soft);}
.peso-inp::placeholder{color:var(--text-muted);}
/* OkNok compacto para card */
.oknok-mini{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.oknok-mini-btn{height:44px;border-radius:var(--radius-sm);border:1.5px solid var(--border);
background:transparent;color:var(--text-dim);font:inherit;font-weight:600;font-size:13px;
cursor:pointer;font-family:var(--mono);letter-spacing:0.04em;transition:all 0.1s;}
.oknok-mini-btn.ok:hover{border-color:var(--ok);color:var(--ok);}
.oknok-mini-btn.nok:hover{border-color:var(--nok);color:var(--nok);}
.oknok-mini-btn.ok[data-on="1"]{border-color:var(--ok);background:var(--ok-soft);color:var(--ok);}
.oknok-mini-btn.nok[data-on="1"]{border-color:var(--nok);background:var(--nok-soft);color:var(--nok);}

/* ── Horno ── */
.horno-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:640px){.horno-grid{grid-template-columns:repeat(2,1fr);}}
.zona{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.zona-num{font-size:30px;font-family:var(--mono);color:var(--text);
text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;font-weight:500;}
.zona-inp-wrap{display:flex;align-items:baseline;gap:8px;}
.zona-inp{flex:1;background:transparent;border:0;border-bottom:2px solid var(--border);
color:var(--text);font:inherit;font-family:var(--mono);font-size:30px;font-weight:600;
padding:4px 0;outline:none;width:100%;min-width:0;-moz-appearance:textfield;}
.zona-inp::-webkit-outer-spin-button,.zona-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.zona-inp:focus{border-bottom-color:var(--accent);}
.zona-inp::placeholder{color:var(--text-muted);opacity:0.5;}
.zona-unit{font-family:var(--mono);font-size:16px;color:var(--text-muted);}
.slide-progress{margin-top:22px;display:flex;align-items:center;gap:14px;}
.progress-track{flex:1;height:4px;background:var(--surface-3);border-radius:999px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:999px;transition:width 0.24s;}
.progress-lbl{font-family:var(--mono);font-size:12px;color:var(--text-dim);}

/* ── Condiciones ── */
.cond-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
@media(max-width:640px){.cond-grid{grid-template-columns:1fr;}}
.cond{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.cond-lbl{font-size:30px;color:var(--text);font-weight:600;margin-bottom:14px;}
.cond-inp-wrap{display:flex;align-items:baseline;gap:8px;}
.cond-inp{flex:1;background:transparent;border:0;border-bottom:2px solid var(--border);
color:var(--text);font:inherit;font-family:var(--mono);font-size:30px;font-weight:600;
padding:4px 0;outline:none;width:100%;min-width:0;-moz-appearance:textfield;}
.cond-inp::-webkit-outer-spin-button,.cond-inp::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.cond-inp:focus{border-bottom-color:var(--accent);}
.cond-inp::placeholder{color:var(--text-muted);opacity:0.5;}
.cond-unit{font-family:var(--mono);font-size:16px;color:var(--text-muted);}

/* ── Resumen ── */
.resumen{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
padding:20px;margin-top:var(--gap);}
.resumen-title{font-size:11px;font-family:var(--mono);color:var(--text-muted);
text-transform:uppercase;letter-spacing:0.1em;font-weight:500;margin-bottom:14px;}
.resumen-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;
background:var(--border);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
@media(max-width:640px){.resumen-grid{grid-template-columns:repeat(2,1fr);}}
.res-item{background:var(--surface);padding:12px 14px;}
.res-item.wide{grid-column:1/-1;}
.res-k{font-size:10px;color:var(--text-muted);text-transform:uppercase;
letter-spacing:0.09em;font-family:var(--mono);margin-bottom:4px;font-weight:500;}
.res-v{font-family:var(--mono);font-size:14px;font-weight:600;}
.res-v.ok{color:var(--ok);}
.res-v.nok{color:var(--nok);}

/* ── Sync pill ── */
.sync-pill{font-size:11px;font-family:var(--mono);padding:4px 10px;border-radius:999px;
display:inline-flex;align-items:center;gap:6px;color:var(--ok);background:var(--ok-soft);}
.sync-pill[data-s="error"]{color:var(--warn);background:rgba(234,179,8,.12);}
.sync-pill[data-s="pending"]{color:var(--warn);background:rgba(234,179,8,.12);}
.sync-pill .d{width:6px;height:6px;border-radius:50%;background:currentColor;}

/* ── Éxito ── */
.exito{min-height:calc(100vh - 60px);display:grid;place-items:center;padding:40px 20px;}
.exito-card{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);
border-radius:var(--radius-lg);padding:40px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,0.25);}
.exito-check{width:72px;height:72px;margin:0 auto 20px;border-radius:50%;
background:var(--ok-soft);color:var(--ok);display:grid;place-items:center;
font-size:36px;font-weight:600;border:2px solid var(--ok);animation:pop 0.4s ease;}
.exito-check.warn{background:rgba(234,179,8,.12);color:var(--warn);border-color:rgba(234,179,8,.4);}
.exito-title{font-size:24px;font-weight:600;margin:0 0 8px;}
.exito-sub{color:var(--text-dim);font-size:14px;margin:0 0 24px;line-height:1.6;}
.exito-row{display:flex;gap:10px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
.exito-actions{display:flex;gap:10px;}
.exito-actions .btn{flex:1;}

<div id="root"></div>
<script type="text/babel">

// ══════════════════════════════════════════════════════════════════
// OFFLINE STORE — IndexedDB wrapper
// ══════════════════════════════════════════════════════════════════
const DB_NAME = "qc_offline";
const DB_VER  = 1;
const STORE   = "pendientes";

function abrirDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE))
        db.createObjectStore(STORE, { keyPath: "id", autoIncrement: true });
    };
    req.onsuccess = (e) => res(e.target.result);
    req.onerror   = (e) => rej(e.target.error);
  });
}

const OfflineStore = {
  async guardar(datos) {
    const db = await abrirDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).add({ ...datos, _savedAt: Date.now() });
      tx.oncomplete = () => res();
      tx.onerror    = (e) => rej(e.target.error);
    });
  },
  async listar() {
    const db = await abrirDB();
    return new Promise((res, rej) => {
      const tx  = db.transaction(STORE, "readonly");
      const req = tx.objectStore(STORE).getAll();
      req.onsuccess = (e) => res(e.target.result);
      req.onerror   = (e) => rej(e.target.error);
    });
  },
  async eliminar(id) {
    const db = await abrirDB();
    return new Promise((res, rej) => {
      const tx = db.transaction(STORE, "readwrite");
      tx.objectStore(STORE).delete(id);
      tx.oncomplete = () => res();
      tx.onerror    = (e) => rej(e.target.error);
    });
  },
  async contarPendientes() {
    const lista = await this.listar();
    return lista.length;
  }
};

// ══════════════════════════════════════════════════════════════════
// GOOGLE SCRIPT BRIDGE
// ══════════════════════════════════════════════════════════════════
const SCRIPT_URL = window.QC_SCRIPT_URL || "https://script.google.com/macros/s/AKfycby2uRtjHwGWBo0z1bMiySRgdx_apCtCGLJc4W6AxKwXWfko5olCXYprxNe3-mk4u6CIzQ/exec";

function gscall(funcName, ...args) {
  const timeout = new Promise((_, reject) =>
    setTimeout(() => reject(new Error("timeout")), 15000)
  );
  const call = new Promise((resolve, reject) => {
    if (window.google && window.google.script && window.google.script.run) {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [funcName](...args);
      return;
    }
    if (SCRIPT_URL) {
      fetch(SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ funcName, args }),
      })
        .then(r => r.json())
        .then(resolve)
        .catch(reject);
      return;
    }
    reject(new Error("Sin backend configurado"));
  });
  return Promise.race([call, timeout]);
}

// ══════════════════════════════════════════════════════════════════
// SYNC ENGINE
// ══════════════════════════════════════════════════════════════════
async function sincronizarPendientes(onProgress) {
  const lista = await OfflineStore.listar();
  if (lista.length === 0) return { enviados: 0, errores: 0 };
  let enviados = 0, errores = 0;
  for (const item of lista) {
    try {
      const { id, _savedAt, ...datos } = item;
      const result = await gscall("guardarControl", datos);
      if (result && result.ok) {
        await OfflineStore.eliminar(id);
        enviados++;
        onProgress && onProgress(enviados, lista.length);
      } else { errores++; }
    } catch (e) { errores++; }
  }
  return { enviados, errores };
}

</script>
<script type="text/babel">

const { useState, useEffect, useCallback, useRef } = React;

// ── Constantes ─────────────────────────────────────────────────
const INYECTORAS = [
  { id:"INY 4" },{ id:"INY 5" },{ id:"INY 6" },
  { id:"INY 7" },{ id:"INY 8" },{ id:"INY 9" },
];

const TIPOS = [
  { id:"BALDE",    desc:"Diám. interno/externo y altura" },
  { id:"BISELADO", desc:"Calibre pasa/no pasa" },
  { id:"ROSCADO",  desc:"Control de torque" },
];

// Genera estado vacío para controles por boca
const emptyBocas = (n) =>
  Array.from({ length: n }, () => ({ peso: "", torque: null, mecha: null }));

const emptyForm = () => ({
  legajo: "", operario: "",
  inyectora: "", codigoPieza: "",
  tipo: "",        // BALDE | BISELADO | ROSCADO
  bocas: 1,
  bocaData: emptyBocas(1),  // [{ peso, torque, mecha }]
  // controles generales (no por boca)
  visual: null, torneado: null, calibre: null,
  // horno
  tempZonas: ["","","","","",""],
  // condiciones
  tempAgua:"", tempAmbiente:"", ciclo:"",
  // dimensiones (solo BALDE)
  diamInterno:"", diamExterno:"", altura:"",
  // observaciones generales
  observaciones:"",
});

// ── Helpers ────────────────────────────────────────────────────
function stepsDe(tipo) {
  // Devuelve lista de pasos para el stepper según tipo
  const base = ["Setup","Controles","Horno","Condiciones"];
  if (tipo === "BALDE") return [...base, "Dimensiones"];
  return base;
}

// ── TopBar ─────────────────────────────────────────────────────
function TopBar({ operario, legajo, paso, tipo, onLogout, conn, pendientes, onSyncNow }) {
  const connLabel = conn==="online"?"Conectado":conn==="offline"?"Sin conexión":"Conectando…";
  const connColor = conn==="online"?"#22c55e":conn==="offline"?"#ef4444":"#eab308";
  const steps = tipo ? stepsDe(tipo) : [];
  const stepIdx = paso - 1; // paso 1 = Setup = index 0

  return (
    <header className="topbar">
      <div className="brand">
        <div className="brand-mark">Q</div>
        <div className="brand-title">Control de Inyección</div>
      </div>
      {paso > 0 && paso < 99 && steps.length > 0 && (
        <div className="stepper-nav">
          {steps.map((s, i) => (
            <div key={s} className="step"
              data-state={stepIdx===i?"current":stepIdx>i?"done":"todo"}>
              <span className="step-num">{i+1}</span>
              <span className="step-lbl">{s}</span>
            </div>
          ))}
        </div>
      )}
      <div className="tb-spacer" />
      {paso > 0 && (
        <div className="tb-pill" title={connLabel}>
          <span className="dot" style={{background:connColor}}/>{connLabel}
        </div>
      )}
      {pendientes > 0 && conn==="online" && (
        <button className="pending-badge" onClick={onSyncNow} title="Sincronizar ahora">
          ⏳ {pendientes} pendiente{pendientes>1?"s":""}
        </button>
      )}
      {operario && <>
        <div className="tb-user">
          <div>
            <div className="tb-user-name">{operario}</div>
            <div className="tb-user-turno">Legajo {legajo}</div>
          </div>
          <div className="tb-user-avatar">{operario.split(" ").map(s=>s[0]).join("").slice(0,2)}</div>
        </div>
        <button className="tb-logout" onClick={onLogout}>Salir</button>
      </>}
    </header>
  );
}

// ── Login ──────────────────────────────────────────────────────
function Legajo({ onLogin, conn }) {
  const [legajo, setLegajo] = useState("");
  const [err, setErr] = useState(false);
  const [validando, setValidando] = useState(false);

  useEffect(() => {
    if (legajo.length === 4 && !validando) {
      setValidando(true);
      Promise.resolve(onLogin(legajo))
        .then(ok => {
          if (!ok) {
            setErr(true);
            setTimeout(() => { setErr(false); setLegajo(""); setValidando(false); }, 600);
          } else { setValidando(false); }
        })
        .catch(() => { setErr(false); setLegajo(""); setValidando(false); });
    }
  }, [legajo]);

  useEffect(() => {
    const onKey = (e) => {
      if (validando) return;
      if (/^[0-9]$/.test(e.key)) setLegajo(p => p.length<4 ? p+e.key : p);
      else if (e.key==="Backspace") setLegajo(p => p.slice(0,-1));
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [validando]);

  const press = (k) => {
    if (validando) return;
    if (k==="del") setLegajo(p => p.slice(0,-1));
    else if (legajo.length<4) setLegajo(p => p+k);
  };

  const subTexto = validando?"Validando legajo…"
    :err?"Legajo no autorizado"
    :conn==="offline"?"Modo sin conexión — ingresá tu legajo para continuar"
    :"Ingresá tu número de legajo (4 dígitos).";

  return (
    <div className="login fade-in">
      <div className="login-card">
        <h1 className="login-title">Iniciar turno</h1>
        {conn==="offline" && (
          <div className="offline-login-info">
            ⚠️ Sin conexión — los registros se guardarán localmente y se enviarán cuando vuelva la señal.
          </div>
        )}
        <p className="login-sub" style={{color:err?"#ef4444":conn==="offline"?"#fbbf24":undefined}}>
          {subTexto}
        </p>
        <div className="pin-dots">
          {[0,1,2,3].map(i => (
            <span key={i} className="pin-dot"
              data-filled={legajo.length>i?"1":"0"}
              data-error={err?"1":"0"} />
          ))}
        </div>
        <div className="keypad">
          {["1","2","3","4","5","6","7","8","9"].map(k => (
            <button key={k} onClick={()=>press(k)} disabled={validando}>{k}</button>
          ))}
          <button className="ghost" disabled />
          <button onClick={()=>press("0")} disabled={validando}>0</button>
          <button onClick={()=>press("del")} disabled={validando}>←</button>
        </div>
      </div>
    </div>
  );
}

// ── OkNok ──────────────────────────────────────────────────────
function OkNok({ label, value, onChange }) {
  return (
    <div className="oknok">
      <div className="oknok-lbl">{label}</div>
      <div className="oknok-btns">
        <button type="button" className="oknok-btn ok"
          data-on={value===true?"1":"0"} onClick={()=>onChange(true)}>OK</button>
        <button type="button" className="oknok-btn nok"
          data-on={value===false?"1":"0"} onClick={()=>onChange(false)}>NO OK</button>
      </div>
    </div>
  );
}

// ── SlideShell ─────────────────────────────────────────────────
function SlideShell({ titulo, subtitulo, children, onBack }) {
  return (
    <div className="slide fade-in">
      <div className="slide-hd">
        <button className="back-btn" onClick={onBack} aria-label="Atrás">←</button>
        <div>
          <h1 className="slide-title">{titulo}</h1>
          {subtitulo && <p className="slide-sub">{subtitulo}</p>}
        </div>
      </div>
      {children}
    </div>
  );
}

function SlideActions({ onBack, onNext, disabled, hint, nextLabel="Continuar →" }) {
  return (
    <div className="slide-actions">
      {hint && <div className="slide-hint">{hint}</div>}
      <div style={{flex:1}} />
      <button className="btn secondary big" onClick={onBack}>Atrás</button>
      <button className="btn big" onClick={onNext} disabled={disabled}>{nextLabel}</button>
    </div>
  );
}

// ── Paso 1: Setup ──────────────────────────────────────────────
function PasoSetup({ form, set, setBocaCount, onBack, onNext }) {
  const listo = form.inyectora && form.codigoPieza.trim() && form.tipo && form.bocas >= 1;

  return (
    <SlideShell titulo="Setup del control"
      subtitulo="Seleccioná la inyectora, ingresá la pieza, el tipo de protector y las bocas del molde."
      onBack={onBack}>
      <div className="slide-card">

        {/* Inyectora */}
        <div className="sec-lbl">Inyectora</div>
        <div className="iny-grid">
          {INYECTORAS.map(m => (
            <button key={m.id} type="button" className="iny-btn"
              data-on={form.inyectora===m.id?"1":"0"}
              onClick={()=>set("inyectora", m.id)}>
              <div className="iny-id">{m.id}</div>
            </button>
          ))}
        </div>

        {/* Código de pieza */}
        <div className="sec-lbl" style={{marginTop:28}}>Código de pieza</div>
        <div style={{maxWidth:280}}>
          <input className="inp big" type="text" inputMode="numeric" pattern="[0-9]*"
            value={form.codigoPieza}
            onChange={e=>set("codigoPieza", e.target.value.replace(/[^0-9]/g,""))}
            placeholder="Ej: 04215" />
        </div>

        {/* Tipo de protector */}
        <div className="sec-lbl" style={{marginTop:28}}>Tipo de protector</div>
        <div className="tipo-grid">
          {TIPOS.map(t => (
            <button key={t.id} type="button" className="tipo-btn"
              data-on={form.tipo===t.id?"1":"0"}
              onClick={()=>set("tipo", t.id)}>
              <div className="tipo-nombre">{t.id}</div>
              <div className="tipo-desc">{t.desc}</div>
            </button>
          ))}
        </div>

        {/* Bocas del molde */}
        <div className="sec-lbl" style={{marginTop:28}}>Bocas del molde</div>
        <div className="bocas-wrap">
          <button className="bocas-btn"
            disabled={form.bocas<=1}
            onClick={()=>setBocaCount(Math.max(1, form.bocas-1))}>−</button>
          <div>
            <div className="bocas-val">{form.bocas}</div>
            <div className="bocas-lbl">boca{form.bocas!==1?"s":""}</div>
          </div>
          <button className="bocas-btn"
            disabled={form.bocas>=12}
            onClick={()=>setBocaCount(Math.min(12, form.bocas+1))}>+</button>
        </div>

      </div>
      <SlideActions onBack={onBack} onNext={onNext} disabled={!listo}
        hint={!listo?"Completá todos los campos para continuar":null} />
    </SlideShell>
  );
}

// ── Paso 2: Controles por boca ─────────────────────────────────
function PasoControles({ form, set, setBocaField, onBack, onNext }) {
  const { tipo, bocas, bocaData, visual, torneado, calibre } = form;
  const n = bocas;

  // Validaciones por tipo
  const bocasCompletas = bocaData.slice(0, n).every(b => {
    const pesoOk   = b.peso !== "";
    const mechaOk  = tipo === "BALDE" ? b.mecha !== null : true;
    const torqueOk = tipo === "ROSCADO" ? b.torque !== null : true;
    return pesoOk && mechaOk && torqueOk;
  });

  const generalesOk = tipo === "BALDE"
    ? visual !== null
    : tipo === "BISELADO"
    ? visual !== null && calibre !== null
    : visual !== null; // ROSCADO

  const listo = bocasCompletas && generalesOk;



  return (
    <SlideShell titulo="Controles"
      subtitulo={`${tipo} · ${n} boca${n!==1?"s":""}`}
      onBack={onBack}>
      <div className="slide-card">

        {/* Cards de bocas — wrap automático */}
        <div className="sec-lbl">Por boca</div>
        <div className="bocas-cards">
          {Array.from({length:n},(_,i) => (
            <div key={i} className="boca-card">
              <div className="boca-card-hd">Boca {i+1}</div>

              <div>
                <div className="boca-card-lbl">Peso (g)</div>
                <input
                  className="peso-inp"
                  type="number" inputMode="decimal" step="0.01" min="0"
                  value={bocaData[i]?.peso??""}
                  onChange={e=>setBocaField(i,"peso",e.target.value)}
                  placeholder="0,00"
                />
              </div>

              {tipo === "BALDE" && (
                <div>
                  <div className="boca-card-lbl">Mecha / Agujero</div>
                  <div className="oknok-mini">
                    <button type="button" className="oknok-mini-btn ok"
                      data-on={bocaData[i]?.mecha===true?"1":"0"}
                      onClick={()=>setBocaField(i,"mecha",true)}>OK</button>
                    <button type="button" className="oknok-mini-btn nok"
                      data-on={bocaData[i]?.mecha===false?"1":"0"}
                      onClick={()=>setBocaField(i,"mecha",false)}>NO OK</button>
                  </div>
                </div>
              )}

              {tipo === "ROSCADO" && (
                <div>
                  <div className="boca-card-lbl">Torque</div>
                  <div className="oknok-mini">
                    <button type="button" className="oknok-mini-btn ok"
                      data-on={bocaData[i]?.torque===true?"1":"0"}
                      onClick={()=>setBocaField(i,"torque",true)}>OK</button>
                    <button type="button" className="oknok-mini-btn nok"
                      data-on={bocaData[i]?.torque===false?"1":"0"}
                      onClick={()=>setBocaField(i,"torque",false)}>NO OK</button>
                  </div>
                </div>
              )}
            </div>
          ))}
        </div>

        {/* Controles generales */}
        <div className="sec-lbl" style={{marginTop:28}}>Controles generales</div>
        <div className={`oknok-grid ${tipo==="BALDE"?"c2":tipo==="BISELADO"?"c2":"c1"}`}>
          <OkNok label="Visual 100%" value={visual} onChange={v=>set("visual",v)} />
          {tipo==="BALDE"    && <OkNok label="Torneado" value={torneado} onChange={v=>set("torneado",v)} />}
          {tipo==="BISELADO" && <OkNok label="Calibre pasa/no pasa" value={calibre} onChange={v=>set("calibre",v)} />}
        </div>

      </div>
      <SlideActions onBack={onBack} onNext={onNext} disabled={!listo}
        hint={!listo?"Completá todos los controles para continuar":null} />
    </SlideShell>
  );
}

// ── Paso 3: Horno ──────────────────────────────────────────────
function PasoHorno({ form, setZona, onBack, onNext }) {
  const obligatorias = form.tempZonas.slice(0,4).filter(v=>v!=="").length;
  const listo = obligatorias === 4;

  const handleZonaChange = (i, e) => {
    let val = e.target.value.replace(/[^0-9]/g,"");
    if (val.length > 3) val = val.slice(0,3);
    setZona(i, val);
    if (val.length === 3) {
      const inputs = document.querySelectorAll(".zona-inp");
      if (inputs[i+1]) inputs[i+1].focus();
    }
  };

  return (
    <SlideShell titulo="Temperaturas del horno"
      subtitulo="Zonas 1 a 4 obligatorias · 5 y 6 opcionales · en °C."
      onBack={onBack}>
      <div className="slide-card">
        <div className="horno-grid">
          {form.tempZonas.map((v,i) => (
            <div key={i} className="zona">
              <div className="zona-num">
                Zona {i+1}
                {i>=4 && <span style={{color:"var(--text-muted)",marginLeft:6,textTransform:"none",letterSpacing:0}}>(opcional)</span>}
              </div>
              <div className="zona-inp-wrap">
                <input className="zona-inp" type="text" inputMode="numeric" pattern="[0-9]*"
                  value={v} onChange={e=>handleZonaChange(i,e)}
                  placeholder="—" maxLength={3} autoFocus={i===0&&v===""} />
                <span className="zona-unit">°C</span>
              </div>
            </div>
          ))}
        </div>
        <div className="slide-progress">
          <div className="progress-track">
            <div className="progress-fill" style={{width:obligatorias/4*100+"%"}} />
          </div>
          <div className="progress-lbl">{obligatorias} de 4 zonas obligatorias</div>
        </div>
      </div>
      <SlideActions onBack={onBack} onNext={onNext} disabled={!listo}
        hint={!listo?`Faltan ${4-obligatorias} zonas obligatorias`:null} />
    </SlideShell>
  );
}

// ── Paso 4: Condiciones ────────────────────────────────────────
function PasoCondiciones({ form, set, onBack, onNext }) {
  const listo = form.tempAgua!==""&&form.tempAmbiente!==""&&form.ciclo!=="";
  return (
    <SlideShell titulo="Condiciones y ciclo"
      subtitulo="Temperatura del agua, ambiente y tiempo de ciclo."
      onBack={onBack}>
      <div className="slide-card">
        <div className="cond-grid">
          {[["tempAgua","Temp. agua","°C"],["tempAmbiente","Temp. ambiente","°C"],["ciclo","Tiempo de ciclo","seg"]].map(([key,label,unit],i)=>(
            <div key={key} className="cond">
              <div className="cond-lbl">{label}</div>
              <div className="cond-inp-wrap">
                <input className="cond-inp" type="number" step="0.1" value={form[key]}
                  onChange={e=>set(key,e.target.value)} placeholder="—" autoFocus={i===0} />
                <span className="cond-unit">{unit}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
      <SlideActions onBack={onBack} onNext={onNext} disabled={!listo}
        hint={!listo?"Completá los 3 campos":null} />
    </SlideShell>
  );
}

// ── Paso 5: Dimensiones (solo BALDE) ──────────────────────────
function ResItem({ k, v, tone, wide }) {
  return (
    <div className={"res-item"+(wide?" wide":"")}>
      <div className="res-k">{k}</div>
      <div className={"res-v"+(tone?" "+tone:"")}>{v||"—"}</div>
    </div>
  );
}

function PasoDimensiones({ form, set, onBack, onSubmit, syncState, conn }) {
  const listo = form.diamInterno!==""&&form.diamExterno!==""&&form.altura!=="";
  const enviando = syncState==="sending";
  const nextLabel = enviando?"Guardando…"
    :conn==="offline"?"Guardar sin conexión ↓"
    :"Guardar y enviar ↗";

  const bocaResumen = form.bocaData.slice(0, form.bocas)
    .map((b,i)=>`B${i+1}:${b.peso}g`).join(" · ");

  return (
    <SlideShell titulo="Dimensiones de la pieza"
      subtitulo={conn==="offline"?"Sin conexión — se guardará localmente.":"Último paso: control dimensional."}
      onBack={onBack}>
      <div className="slide-card">
        <div className="cond-grid">
          {[["diamInterno","Diámetro interno","mm"],["diamExterno","Diámetro externo","mm"],["altura","Altura","mm"]].map(([key,label,unit],i)=>(
            <div key={key} className="cond">
              <div className="cond-lbl">{label}</div>
              <div className="cond-inp-wrap">
                <input className="cond-inp" type="number" step="0.01" value={form[key]}
                  onChange={e=>set(key,e.target.value)} placeholder="—" autoFocus={i===0} />
                <span className="cond-unit">{unit}</span>
              </div>
            </div>
          ))}
        </div>
        <div className="sec-lbl" style={{marginTop:28}}>Observaciones</div>
        <textarea
          className="inp"
          rows={3}
          style={{height:"auto",padding:"12px 14px",resize:"vertical"}}
          value={form.observaciones}
          onChange={e=>set("observaciones",e.target.value)}
          placeholder="Opcional — anotá cualquier novedad o situación particular…"
        />
      </div>
      <div className="resumen">
        <div className="resumen-title">Resumen del registro</div>
        <div className="resumen-grid">
          <ResItem k="Inyectora" v={form.inyectora} />
          <ResItem k="Tipo" v={form.tipo} />
          <ResItem k="Pieza" v={form.codigoPieza} />
          <ResItem k="Bocas" v={form.bocas} />
          <ResItem k="Pesos" v={bocaResumen} wide />
          <ResItem k="Visual"   v={form.visual===null?"—":(form.visual?"OK":"NO OK")}   tone={form.visual===null?null:(form.visual?"ok":"nok")} />
          <ResItem k="Torneado" v={form.torneado===null?"—":(form.torneado?"OK":"NO OK")} tone={form.torneado===null?null:(form.torneado?"ok":"nok")} />
          <ResItem k="Zonas horno" v={form.tempZonas.filter(z=>z).map(z=>z+"°").join(" · ")} wide />
        </div>
      </div>
      <SlideActions onBack={onBack} onNext={onSubmit} disabled={!listo||enviando}
        nextLabel={nextLabel}
        hint={!listo&&!enviando?"Completá los 3 campos dimensionales":null} />
    </SlideShell>
  );
}

// ── Paso final sin dimensiones (BISELADO / ROSCADO) ────────────
function PasoResumenFinal({ form, set, onBack, onSubmit, syncState, conn }) {
  const enviando = syncState==="sending";
  const nextLabel = enviando?"Guardando…"
    :conn==="offline"?"Guardar sin conexión ↓"
    :"Guardar y enviar ↗";

  const bocaResumen = form.bocaData.slice(0, form.bocas)
    .map((b,i)=>`B${i+1}:${b.peso}g`).join(" · ");

  return (
    <SlideShell titulo="Resumen y envío"
      subtitulo={conn==="offline"?"Sin conexión — se guardará localmente.":"Revisá el resumen y enviá a Google Sheets."}
      onBack={onBack}>
      <div className="slide-card" style={{marginBottom:14}}>
        <div className="sec-lbl" style={{marginTop:0}}>Observaciones</div>
        <textarea
          className="inp"
          rows={3}
          style={{height:"auto",padding:"12px 14px",resize:"vertical"}}
          value={form.observaciones}
          onChange={e=>set("observaciones",e.target.value)}
          placeholder="Opcional — anotá cualquier novedad o situación particular…"
        />
      </div>
      <div className="resumen" style={{marginTop:0}}>
        <div className="resumen-title">Resumen del registro</div>
        <div className="resumen-grid">
          <ResItem k="Inyectora" v={form.inyectora} />
          <ResItem k="Tipo" v={form.tipo} />
          <ResItem k="Pieza" v={form.codigoPieza} />
          <ResItem k="Bocas" v={form.bocas} />
          <ResItem k="Pesos" v={bocaResumen} wide />
          <ResItem k="Visual" v={form.visual===null?"—":(form.visual?"OK":"NO OK")} tone={form.visual===null?null:(form.visual?"ok":"nok")} />
          {form.tipo==="BISELADO" && <ResItem k="Calibre" v={form.calibre===null?"—":(form.calibre?"OK":"NO OK")} tone={form.calibre===null?null:(form.calibre?"ok":"nok")} />}
          <ResItem k="Zonas horno" v={form.tempZonas.filter(z=>z).map(z=>z+"°").join(" · ")} wide />
          <ResItem k="Temp. agua" v={form.tempAgua+"°C"} />
          <ResItem k="Temp. ambiente" v={form.tempAmbiente+"°C"} />
          <ResItem k="Ciclo" v={form.ciclo+" seg"} />
        </div>
      </div>
      <SlideActions onBack={onBack} onNext={onSubmit} disabled={enviando}
        nextLabel={nextLabel} />
    </SlideShell>
  );
}

// ── Éxito ──────────────────────────────────────────────────────
function Exito({ form, onNuevo, onSalir, syncState }) {
  const offline = syncState==="offline_saved";
  const error   = syncState==="error";
  return (
    <div className="exito fade-in">
      <div className="exito-card">
        <div className={"exito-check"+(offline||error?" warn":"")}>{offline?"⏳":error?"!":"✓"}</div>
        <h1 className="exito-title">
          {offline?"Guardado sin conexión":error?"Error al enviar":"Control registrado"}
        </h1>
        <p className="exito-sub">
          {offline
            ? <>Registro guardado localmente. Se enviará a <b>Google Sheets</b> al reconectarse · pieza <b style={{color:"var(--accent)"}}>{form.codigoPieza}</b> en <b style={{color:"var(--accent)"}}>{form.inyectora}</b>.</>
            : error
            ? <>No se pudo enviar. Intentá de nuevo más tarde · pieza <b style={{color:"var(--accent)"}}>{form.codigoPieza}</b>.</>
            : <>Se agregó una fila en <b>Google Sheets</b> · pieza <b style={{color:"var(--accent)"}}>{form.codigoPieza}</b> en <b style={{color:"var(--accent)"}}>{form.inyectora}</b>.</>
          }
        </p>
        <div className="exito-row">
          <span className="sync-pill" data-s={offline?"pending":error?"error":"synced"}>
            <span className="d" />{offline?"Pendiente de sync":error?"Error de envío":"Sincronizado"}
          </span>
        </div>
        <div className="exito-actions">
          <button className="btn secondary" onClick={onSalir}>Cerrar sesión</button>
          <button className="btn" onClick={onNuevo}>+ Nuevo control</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP PRINCIPAL
// ══════════════════════════════════════════════════════════════════
function App() {
  const [paso, setPaso]         = useState(0);
  const [form, setForm]         = useState(emptyForm());
  const [syncState, setSyncState] = useState("idle");
  const [conn, setConn]         = useState("checking");
  const [pendientes, setPendientes] = useState(0);

  useEffect(() => {
    document.documentElement.dataset.tema   = "dark";
    document.documentElement.dataset.acento = "cyan";
  }, []);

  const checkConn = useCallback(async () => {
    setConn(navigator.onLine ? "online" : "offline");
  }, []);

  useEffect(() => {
    checkConn();
    const id = setInterval(checkConn, 15000);
    const onOnline  = () => { checkConn(); sincronizarPendientes(null).then(actualizarPendientes); };
    const onOffline = () => setConn("offline");
    window.addEventListener("online",  onOnline);
    window.addEventListener("offline", onOffline);
    return () => { clearInterval(id); window.removeEventListener("online",onOnline); window.removeEventListener("offline",onOffline); };
  }, []);

  const actualizarPendientes = useCallback(async () => {
    const n = await OfflineStore.contarPendientes();
    setPendientes(n);
  }, []);

  useEffect(() => { actualizarPendientes(); }, [paso]);

  const set = (k,v) => setForm(f => ({...f, [k]:v}));

  const setZona = (i,v) => setForm(f => {
    const z=[...f.tempZonas]; z[i]=v; return {...f,tempZonas:z};
  });

  const setBocaField = (i, key, val) => setForm(f => {
    const bd = f.bocaData.map((b,idx) => idx===i ? {...b,[key]:val} : b);
    return {...f, bocaData:bd};
  });

  const setBocaCount = (n) => setForm(f => {
    // Ajusta bocaData al nuevo tamaño sin perder datos ya cargados
    const old = f.bocaData;
    const bd  = Array.from({length:n},(_,i) => old[i] ?? {peso:"",torque:null,mecha:null});
    return {...f, bocas:n, bocaData:bd};
  });

  // Login
  const onLogin = async (legajo) => {
    if (conn==="offline" || !navigator.onLine) {
      setConn("offline");
      setForm(f=>({...f,legajo,operario:`Operario ${legajo}`}));
      setPaso(1); return true;
    }
    try {
      const data = await gscall("validarLegajo", legajo);
      if (data && data.ok && data.nombre) {
        setForm(f=>({...f,legajo:data.legajo||legajo,operario:data.nombre}));
        setPaso(1); return true;
      }
      return false;
    } catch (e) {
      setConn("offline");
      setForm(f=>({...f,legajo,operario:`Operario ${legajo}`}));
      setPaso(1); return true;
    }
  };

  // Determinar el paso de envío según tipo
  // BALDE:    1=Setup → 2=Controles → 3=Horno → 4=Condiciones → 5=Dimensiones → 99=Éxito
  // BISELADO: 1=Setup → 2=Controles → 3=Horno → 4=Condiciones → 6=ResumenFinal → 99=Éxito
  // ROSCADO:  igual que BISELADO

  const enviar = async () => {
    setSyncState("sending");

    const bocasArr = form.bocaData.slice(0, form.bocas);
    const pesosStr   = bocasArr.map((b,i)=>`Boca${i+1}:${b.peso}g`).join("; ");
    const mechasStr  = bocasArr.map((b,i)=>`Boca${i+1}:${b.mecha===null?"":b.mecha?"OK":"NOK"}`).join("; ");
    const torquesStr = bocasArr.map((b,i)=>`Boca${i+1}:${b.torque===null?"":b.torque?"OK":"NOK"}`).join("; ");

    const body = {
      timestamp:    new Date().toISOString(),
      legajo:       form.legajo,
      operario:     form.operario,
      inyectora:    form.inyectora,
      tipo:         form.tipo,
      bocas:        form.bocas,
      codigoPieza:  form.codigoPieza,
      pesos:        pesosStr,
      mechas:       mechasStr,
      torques:      torquesStr,
      visual:       form.visual===null?"" : (form.visual?"OK":"NO OK"),
      torneado:     form.tipo==="BALDE"    ? (form.torneado===null?"" : (form.torneado?"OK":"NO OK")) : "",
      calibre:      form.tipo==="BISELADO" ? (form.calibre===null?""  : (form.calibre?"OK":"NO OK"))  : "",
      zona1:        form.tempZonas[0], zona2:form.tempZonas[1],
      zona3:        form.tempZonas[2], zona4:form.tempZonas[3],
      zona5:        form.tempZonas[4], zona6:form.tempZonas[5],
      tempAgua:     form.tempAgua,
      tempAmbiente: form.tempAmbiente,
      ciclo:        form.ciclo,
      diamInterno:  form.tipo==="BALDE" ? form.diamInterno  : "",
      diamExterno:  form.tipo==="BALDE" ? form.diamExterno  : "",
      altura:       form.tipo==="BALDE" ? form.altura        : "",
      observaciones: form.observaciones,
    };

    // Siempre intentar enviar — solo guardar offline si realmente falla
    try {
      const data = await gscall("guardarControl", body);
      if (data && data.ok) {
        setSyncState("synced");
      } else {
        throw new Error("Respuesta inválida");
      }
    } catch (err) {
      console.warn("Envío falló, guardando offline:", err);
      try {
        await OfflineStore.guardar(body);
        setSyncState("offline_saved");
        await actualizarPendientes();
      } catch (e) {
        setSyncState("error");
      }
    }
    setPaso(99);
  };

  const reset = () => { setForm(emptyForm()); setSyncState("idle"); setPaso(0); };

  const nuevoMismoOperario = () => {
    const { legajo, operario } = form;
    setForm({...emptyForm(), legajo, operario});
    setSyncState("idle"); setPaso(1);
  };

  const syncNow = async () => {
    const { enviados } = await sincronizarPendientes(null);
    await actualizarPendientes();
    if (enviados>0) alert(`✓ ${enviados} registro${enviados>1?"s":""} sincronizado${enviados>1?"s":""} con Google Sheets.`);
  };

  // Navegación hacia atrás desde horno
  const backFromHorno = () => setPaso(2);
  // Navegación hacia atrás desde condiciones
  const backFromCond  = () => setPaso(3);
  // Desde paso de envío (dim o resumen)
  const backFromFinal = () => setPaso(4);

  return (
    <div className="app">
      <TopBar operario={form.operario} legajo={form.legajo} paso={paso} tipo={form.tipo}
        onLogout={reset} conn={conn} pendientes={pendientes} onSyncNow={syncNow} />

      {conn==="offline" && paso>0 && (
        <div className="offline-banner">
          <span className="dot" />
          Sin conexión — los cambios se guardan localmente y se sincronizan al reconectarse.
          {pendientes>0 && <span>({pendientes} registro{pendientes>1?"s":""} pendiente{pendientes>1?"s":""})</span>}
        </div>
      )}

      <main className="main">
        {paso===0  && <Legajo onLogin={onLogin} conn={conn} />}

        {paso===1  && (
          <PasoSetup form={form} set={set} setBocaCount={setBocaCount}
            onBack={reset} onNext={()=>setPaso(2)} />
        )}

        {paso===2  && (
          <PasoControles form={form} set={set} setBocaField={setBocaField}
            onBack={()=>setPaso(1)} onNext={()=>setPaso(3)} />
        )}

        {paso===3  && (
          <PasoHorno form={form} setZona={setZona}
            onBack={()=>setPaso(2)} onNext={()=>setPaso(4)} />
        )}

        {paso===4  && (
          <PasoCondiciones form={form} set={set}
            onBack={()=>setPaso(3)}
            onNext={()=>setPaso(form.tipo==="BALDE" ? 5 : 6)} />
        )}

        {paso===5  && form.tipo==="BALDE" && (
          <PasoDimensiones form={form} set={set}
            onBack={backFromFinal} onSubmit={enviar}
            syncState={syncState} conn={conn} />
        )}

        {paso===6  && form.tipo!=="BALDE" && (
          <PasoResumenFinal form={form} set={set}
            onBack={backFromCond} onSubmit={enviar}
            syncState={syncState} conn={conn} />
        )}

        {paso===99 && (
          <Exito form={form} syncState={syncState}
            onNuevo={nuevoMismoOperario} onSalir={reset} />
        )}
      </main>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js")
      .then(reg => console.log("SW registrado:", reg.scope))
      .catch(err => console.warn("SW error:", err));
  });
}
</script>
</body>
</html>
